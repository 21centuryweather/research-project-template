# questions
project_name:
    type: str
    help: What is your project name?
    validator: >-
        {% if not (project_name | regex_search('[a-zA-Z_-]')) %}
        Must use a lowercase or upper case letter, numbers, - or _. No Spaces allowed.
        {% endif %}

project_description:
    type: str
    help: Short description of your project.
    default: ""

home_directory:
    type: bool
    help: Are you creating this project in your home directory on gadi? (if yes, a {{project_name}}/data folder will be created
          in gdata and it will be linked in your project directory)
    default: yes
    choices:
        yes: yes
        no: no

nci_project:
    type: str
    default: $PROJECT
    help: In which NCI project would you like to store big data files? For temporal data, data/temp will be created in 
          scratch and linked in your project directory)

git:
    type: bool
    help: Do you want to initialize a git repository for this project?
    default: yes
    choices:
        yes: yes
        no: no
envrc:
    type: bool
    help: Do you want to use an envrc file for this project? (great for managing your project environment outside ARE)
    default: yes
    choices:
        yes: yes
        no: no

create_example_module:
    help: Do you want to create some example module code?
    type: bool
    default: yes
    choices:
        yes: yes
        no: no


_tasks:
    - command: "mkdir -p {{ _copier_conf.dst_path }}/{{project_name}}/data/raw &&
                touch {{ _copier_conf.dst_path }}/{{project_name}}//data/raw/DO_NOT_EDIT &&
                mkdir -p {{ _copier_conf.dst_path }}/{{project_name}}//data/processed &&
                mkdir -p /scratch/{{nci_project}}/$USER/{{project_name}}/data/temp &&
                ln -s /scratch/{{nci_project}}/$USER/{{project_name}}/data/temp {{ _copier_conf.dst_path }}/{{project_name}}/data/"
      when: "{{ not home_directory }}"
    - command: "mkdir -p /g/data/{{nci_project}}/$USER/{{project_name}}/data/raw &&
                touch /g/data/{{nci_project}}/$USER/{{project_name}}/data/raw/DO_NOT_EDIT &&
                mkdir -p /g/data/{{nci_project}}/$USER/{{project_name}}/data/processed &&
                ln -s /g/data/{{nci_project}}/$USER/{{project_name}}/data {{ _copier_conf.dst_path }}/{{project_name}}/ &&
                mkdir -p /scratch/{{nci_project}}/$USER/{{project_name}}/data/temp &&
                ln -s /scratch/{{nci_project}}/$USER/{{project_name}}/data/temp {{ _copier_conf.dst_path }}/{{project_name}}/data/"
      when: "{{ home_directory }}"
    - command: cd {{ _copier_conf.dst_path }}/{{project_name}} && git init --initial-branch=main &&
               git add . &&
               git commit -m 'Start project based on project template'
      when: "{{ git }}" 

_message_after_copy: |
    ======================================================================
    Your project "{{ project_name }}" has been created successfully!

    There are a few more manual (but optional!) steps to finish the setup.
    
    {%- if envrc  %}
    * Go to your project directory and complete the .envrc file with the modules and configuration you need for your project. 
       $ cd {{ _copier_conf.dst_path }}/{{project_name}}
       $ vim .envrc
       $ direnv allow
    To use this tool you need to have direnv installed and configured. 
    See https://21centuryweather.github.io/21st-Century-Weather-Software-Wiki/gadi/mdirenv.html for more information.
    {%- endif %}

    {%- if git  %}
    * Push your project to a new repository on GitHub:
       $ git remote add origin git@github.com:<you username>/{{project_name}}.git
       $ git push -u origin main
    {%- endif %}

    * At one point you will want to save the requirements for your project. Check the instructions in the
    requirements.txt file for how to do this.

# Subdirectory that contain the template
_subdirectory: template_python

# Require that the user has at least Copier v9.1.0 installed
_min_copier_version: "9.15.0"